<p-toast></p-toast>
<div class="forgot-page">
  <!-- Animated background shapes -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <!-- Forgot password card -->
  <main class="forgot-card animate-fade-in-up-card">
    <div class="card-header animate-fade-in-up">
      <h1 class="card-headline">Forgot password?</h1>
      <p class="card-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
    </div>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="forgot-form">
      <div class="input-group animate-fade-in-up-50">
        <label for="email">Email address</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 4.5H15C15.4125 4.5 15.75 4.8375 15.75 5.25V12.75C15.75 13.1625 15.4125 13.5 15 13.5H3C2.5875 13.5 2.25 13.1625 2.25 12.75V5.25C2.25 4.8375 2.5875 4.5 3 4.5Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M15.75 5.25L9 10.125L2.25 5.25" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input
            pInputText
            type="email"
            id="email"
            formControlName="email"
            placeholder="you@example.com"
            class="forgot-input"
          />
        </div>
      </div>

      <button
        type="submit"
        [disabled]="!forgotPasswordForm.valid || isLoading"
        class="btn-signin animate-fade-in-up-100"
      >
        @if (!isLoading) {
          <span>Send Reset Link</span>
        }
        @if (isLoading) {
          <span class="loading-text">
            <svg class="spinner-apple" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="34" stroke-dashoffset="10"/>
            </svg>
            Sending…
          </span>
        }
      </button>
    </form>

    <div class="card-footer animate-fade-in-up-150">
      <a routerLink="/" class="link back-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 3L5 7L9 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Sign In
      </a>
    </div>
  </main>
</div>
