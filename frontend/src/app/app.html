<div class="app-container">
  <router-outlet />

  <!-- Theme Transition Overlay -->
  <div
    class="theme-overlay"
    [class.active]="overlayActive()"
    [class.dark-mode]="overlayMode() === 'dark-mode'"
    [class.light-mode]="overlayMode() === 'light-mode'"
  ></div>

  <!-- Theme Toggle -->
  <button
    class="theme-toggle"
    (click)="toggleTheme($event)"
    [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
  >
    <div class="toggle-icon">
      @if (isDark()) {
        <!-- Sun icon (light mode) -->
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 1V3M10 17V19M19 10H17M3 10H1M16.5 3.5L15 5M5 15L3.5 16.5M16.5 16.5L15 15M5 5L3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      } @else {
        <!-- Moon icon (dark mode) -->
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M17 11.5C15 13 12 13 10 11C8 9 8 6 9.5 4C6 4.5 3 7.5 3 11.5C3 15.5 6.5 19 10.5 19C14 19 16.5 16.5 17 13.5C16.5 14 16 14.5 15.5 14.5C14 15 12.5 14.5 11.5 13.5C10.5 12.5 10 11 10.5 9.5C11 8.5 11.5 8 12 7.5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      }
    </div>
    <span class="toggle-label">{{ isDark() ? 'Light' : 'Dark' }} Mode</span>
  </button>
</div>
