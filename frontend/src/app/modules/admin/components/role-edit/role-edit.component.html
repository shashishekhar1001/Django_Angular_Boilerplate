<p-toast 
  [showTransformOptions]="'translateY(-100%)'" 
  [showTransitionOptions]="'300ms ease-out'"
  [hideTransformOptions]="'translateY(-10px)'"
  [hideTransitionOptions]="'200ms ease-in'"></p-toast>
<div class="role-edit-page">
  <!-- Header -->
  <div class="page-header animate-fade-in-up-fast">
    <div class="header-left">
      <button class="back-btn" (click)="goBack()" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M11 4L6 9L11 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div>
        <h1 class="page-title">{{ isNewRole() ? 'Add Role' : 'Edit Role' }}</h1>
        <p class="page-subtitle">{{ isNewRole() ? 'Create a new role with permissions' : 'Update role name and permissions' }}</p>
      </div>
    </div>
  </div>

  <!-- Form Card -->
  <div class="form-card animate-fade-in-up-fast">
    <form (ngSubmit)="saveRole()">
      <div class="form-section">
        <h2 class="form-section-title">Role Details</h2>
        <div class="form-grid">
          <div class="form-field full-width">
            <label for="roleName">Role name</label>
            <input
              pInputText
              id="roleName"
              [ngModel]="name()"
              (ngModelChange)="name.set($event)"
              name="roleName"
              required
              placeholder="e.g. Editor, Moderator, Manager"
              class="apple-input"
              />
          </div>
        </div>
      </div>

      <div class="form-divider"></div>

      <div class="form-section">
        <h2 class="form-section-title">Permissions</h2>
        <div class="form-field full-width">
          <label for="permissions">Assign permissions</label>
          <p-multiSelect
            [ngModel]="selectedPermissionIds()"
            (ngModelChange)="selectedPermissionIds.set($event)"
            name="permissions"
            [options]="availablePermissions()"
            optionLabel="name"
            optionValue="id"
            placeholder="Select permissions"
            display="chip"
            styleClass="apple-multiselect"
          ></p-multiSelect>
        </div>
      </div>

      <div class="form-divider"></div>

      <div class="form-actions">
        <button type="button" class="btn-ghost" (click)="goBack()">Cancel</button>
        @if (!isNewRole()) {
          <button type="button" class="btn-danger" (click)="deleteRole()">Delete</button>
        }
        <button type="submit" class="btn-primary" [disabled]="saving()">
          @if (!saving()) {
            <span>{{ isNewRole() ? 'Create Role' : 'Save Changes' }}</span>
          }
          @if (saving()) {
            <span class="loading-text">
              <svg class="spinner-apple" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="29" stroke-dashoffset="8"/>
              </svg>
              Saving…
            </span>
          }
        </button>
      </div>
    </form>
  </div>
</div>

<p-confirmDialog></p-confirmDialog>
